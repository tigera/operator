---

extends: default

rules:
  line-length: disable
  document-start: disable
  truthy: disable
  indentation:
    spaces: consistent
    indent-sequences: consistent
  comments:
    require-starting-space: false
    min-spaces-from-content: 1
  comments-indentation: disable
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore:
  # gitignored upstream clone pulled in at build time
  - .crds/
  # controller-gen / imported CRDs and admission policies
  - pkg/imports/
  # vendored third-party CRDs (elastic, prometheus, openshift)
  - deploy/crds/
