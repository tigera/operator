managedClusterVersions:
  defaultVersion: ''
  orgDefaults: {}
  enabledVersions: []
  aliases:
    '': unknown # the '' version is the same as unknown
  versions:
#  - version: (v18.2.0) String displayed in the UI and used when storing the version for managed clusters
#    semVer: (18.2.0) Used to check if one version is newer or older compared to another
#    installable: () Unset means true, false will stop it from being displayed/installable.
#    releaseNotesLink: Link to the release notes for the release, initially this might just be a link to the
#       release notes but then later we can update to a tag
#    updateRequiredTime: (2025-01-01T00:00:00Z) Date when this version will be displayed as update required,
#       this should be the date of the release before this version becomes unsupported.
#    unsupportedTime: (2025-02-01T00:00:00Z) Date when this version will be displayed as unsupported,
#       this should be the date when the release comes out that makes this version 2 enterprise minor version behind.
#    cloudManifestVersion: (v3.18.0-1.1-6-dev) Artifact created from cloud-manifests, it is generated with a
#       'make release' or 'make release-dev' which creates the artifact and tags the repo.
#    banzaiServiceGitRef: (install-v3.18.0-1.1-5) Tag on banzai-service
#    alwaysFetchTemplate: (true) This should be false in production, set to true when referencing a branch so
#        the latest version will be used when testing in dev.
#    useUpstreamManifests: (false) Use this if we want to pull in manifests from an enterprise release directly.
#    enterpriseDownloadUrl: (unused) The enterprise download URL to use if the above field is true.
#    enterpriseVersion: (v3.18.0-1.1) Currently unused but could be used by UI to display the enterprise version included with this version.
  - version: master
    semVer: 99.9.9 # has to be the highest so that all other versions appear
    releaseNotesLink: https://www.dev.calicocloud.io # dummy url
    updateRequiredTime: 2049-01-01T00:00:00Z
    unsupportedTime: 2049-12-25T00:00:00Z
    cloudManifestVersion: v3.18.0-2.0-2-dev
    banzaiServiceGitRef: master
    alwaysFetchTemplate: true
    useUpstreamManifests: false
    enterpriseDownloadUrl: unused
    enterpriseVersion: v3.18.0-2.0
