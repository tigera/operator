apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: globalalerttemplates.projectcalico.org
spec:
  group: projectcalico.org
  names:
    kind: GlobalAlertTemplate
    listKind: GlobalAlertTemplateList
    plural: globalalerttemplates
    singular: globalalerttemplate
  preserveUnknownFields: false
  scope: Cluster
  versions:
    - name: v3
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              properties:
                aggregateBy:
                  description: |-
                    An optional list of fields to aggregate results.
                    Only used if Type is RuleBased.
                  items:
                    type: string
                  type: array
                  x-kubernetes-list-type: atomic
                condition:
                  description: |-
                    Compare the value of the metric to the threshold using this condition.
                    Only used if Type is RuleBased.
                  enum:
                    - eq
                    - not_eq
                    - gt
                    - gte
                    - lt
                    - lte
                  maxLength: 16
                  type: string
                dataSet:
                  description: |-
                    DataSet determines which dataset type the Query will use.
                    Required and used only if Type is RuleBased.
                  enum:
                    - flows
                    - dns
                    - audit
                    - l7
                    - waf
                    - vulnerability
                  maxLength: 32
                  type: string
                description:
                  description: Human-readable description of the template.
                  type: string
                detector:
                  description: |-
                    Parameters for configuring an AnomalyDetection run.
                    Only used if Type is AnomalyDetection.
                  properties:
                    name:
                      description: Name specifies the AnomalyDetection Detector to run.
                      type: string
                  required:
                    - name
                  type: object
                field:
                  description: |-
                    Which field to aggregate results by if using a metric other than count.
                    Only used if Type is RuleBased.
                  maxLength: 256
                  type: string
                lookback:
                  description: |-
                    How much data to gather at once.
                    If Type is RuleBased, it must exceed audit log flush interval, dnsLogsFlushInterval, or flowLogsFlushInterval as appropriate.
                  type: string
                metric:
                  description: |-
                    A metric to apply to aggregated results. count is the number of log entries matching the aggregation pattern.
                    Others are applied only to numeric fields in the logs.
                    Only used if Type is RuleBased.
                  enum:
                    - avg
                    - max
                    - min
                    - sum
                    - count
                  maxLength: 16
                  type: string
                period:
                  description: |-
                    If Type is RuleBased, it is how often the query defined will run.
                    If Type is AnomalyDetection it is how often the detector will be run.
                  type: string
                query:
                  description:
                    Which data to include from the source data set. Written
                    in a domain-specific query language. Only used if Type is RuleBased.
                  type: string
                severity:
                  description: Severity of the alert for display in Manager.
                  type: integer
                substitutions:
                  description: |-
                    An optional list of values to replace variable names in query.
                    Only used if Type is RuleBased.
                  items:
                    description:
                      GlobalAlertSubstitution substitutes for the variables
                      in the set operators of a Query.
                    properties:
                      name:
                        type: string
                      values:
                        items:
                          type: string
                        type: array
                        x-kubernetes-list-type: atomic
                    required:
                      - name
                    type: object
                  type: array
                  x-kubernetes-list-type: atomic
                summary:
                  description:
                    Template for the description field in generated events,
                    description is used if this is omitted.
                  type: string
                threshold:
                  description: |-
                    A numeric value to compare the value of the metric against.
                    Only used if Type is RuleBased.
                  type: number
                type:
                  description: |-
                    Type will dictate how the fields of the GlobalAlert will be utilized.
                    Each Type will have different usages and defaults for the fields. [Default: RuleBased]
                  enum:
                    - RuleBased
                  type: string
              required:
                - description
                - severity
              type: object
              x-kubernetes-validations:
                - message: field without metric is invalid
                  reason: FieldValueInvalid
                  rule:
                    "!has(self.field) || size(self.field) == 0 || (has(self.metric)
                    && size(self.metric) > 0)"
                - message: count metric cannot be applied to a field
                  reason: FieldValueInvalid
                  rule:
                    "!has(self.metric) || self.metric != 'count' || !has(self.field)
                    || size(self.field) == 0"
                - message: non-count metrics require a field
                  reason: FieldValueInvalid
                  rule:
                    "!has(self.metric) || self.metric == 'count' || size(self.metric)
                    == 0 || (has(self.field) && size(self.field) > 0)"
                - message: metrics require a condition
                  reason: FieldValueInvalid
                  rule:
                    "!has(self.metric) || size(self.metric) == 0 || (has(self.condition)
                    && size(self.condition) > 0)"
                - message: dataSet is required for RuleBased alerts
                  reason: FieldValueInvalid
                  rule:
                    (has(self.type) && self.type != 'RuleBased') || (has(self.dataSet)
                    && size(self.dataSet) > 0)
          required:
            - metadata
            - spec
          type: object
      served: true
      storage: true
