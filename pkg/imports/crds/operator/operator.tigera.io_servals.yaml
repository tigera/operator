apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: servals.operator.tigera.io
spec:
  group: operator.tigera.io
  names:
    kind: Serval
    listKind: ServalList
    plural: servals
    singular: serval
  scope: Cluster
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          description: |-
            Serval installs the Serval gateway, the single layer-7 entrypoint through
            which non-cluster hosts reach the cluster. It supersedes the deprecated
            NonClusterHost resource.
            At most one instance of this resource is supported. It must be named "tigera-secure".
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: Specification of the desired state for the Serval gateway.
              properties:
                endpoint:
                  description: |-
                    Endpoint is the external URL through which non-cluster hosts reach the
                    Serval gateway. It serves the kube-apiserver proxy, log ingestion, and
                    the felix-to-typha WebSocket tunnel. For example: https://gateway.example.com:443
                  pattern: ^https://.+$
                  type: string
              required:
                - endpoint
              type: object
          type: object
          x-kubernetes-validations:
            - message: resource name must be 'tigera-secure'
              rule: self.metadata.name == 'tigera-secure'
      served: true
      storage: true
