        "tls.key_file": "/calico-fluent-bit-tls/tls.key",
        "tls.verify": "on",
        "tls.verify_hostname": "on",
        "uri": "/api/v1/policy_activity/logs/bulk"
      },
      {
        "bucket": "dummy-bucket",
        "compression": "gzip",
        "match": "flows",
        "name": "s3",
        "region": "not-real-region",
        "retry_limit": "no_limits",
        "s3_key_format": "not-a-bucket/flows/%Y%m%d_$UUID.gz",
        "storage.total_limit_size": "500M",
        "total_file_size": "10M",
        "upload_timeout": "5s"
      },
      {
        "bucket": "dummy-bucket",
        "compression": "gzip",
        "match": "dns",
